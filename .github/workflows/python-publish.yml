# Automated release: runs on push to master after tests pass.
# Uses conventional commits to determine version bump:
#   fix: ...          → patch (0.1.0 → 0.1.1)
#   feat: ...         → minor (0.1.0 → 0.2.0)
#   feat!: ...        → major (0.1.0 → 1.0.0)
#   BREAKING CHANGE:  → major
#
# Prerequisites: configure trusted publishing on PyPI for this repo.
# See: https://docs.pypi.org/trusted-publishers/creating-a-project-through-oidc/

name: Release & Publish

on:
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Lint
        run: |
          python -m pip install ruff
          ruff check src/

  release:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      contents: write
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/p/httplite

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install python-semantic-release
        run: python -m pip install python-semantic-release

      - name: Semantic release (version, tag, changelog, build)
        id: semrel
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          semantic-release version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to PyPI
        if: hashFiles('dist/*') != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: Create GitHub release
        if: hashFiles('dist/*') != ''
        run: semantic-release publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
